      // Inline Encapsulated Notes script will attach after render; helper to safely run DOM ops
      function initEncapsulatedNotes() {
        try {
          const KEY = 'encapsulated-notes-v1';
          const noteEl = document.getElementById('enc-note-ai');
          if (!noteEl) return;

          const el = {
            note: noteEl,
            days: document.getElementById('enc-days-ai'),
            save: document.getElementById('enc-save-ai'),
            clear: document.getElementById('enc-clear-ai'),
            list: document.getElementById('enc-list-ai')
          };

          let notes = JSON.parse(localStorage.getItem(KEY) || '[]');

          function saveStore(){ localStorage.setItem(KEY, JSON.stringify(notes)); }
          function formatRemaining(ms){ if(ms<=0) return 'unlocked'; const d=Math.ceil(ms/(24*60*60*1000)); return d+' day'+(d===1?'':'s'); }

          function render(){
            el.list.innerHTML = '';
            if(!notes.length){ el.list.innerHTML = '<p className="text-sm text-slate-400">No locked notes.</p>'; return }
            const now = Date.now();
            notes.slice().reverse().forEach(n => {
              const wrap = document.createElement('div');
              wrap.style.cssText = 'background:#06131f;border:1px solid #122233;padding:10px;border-radius:6px;margin-bottom:8px;display:flex;justify-content:space-between;gap:12px;align-items:flex-start';
              const left = document.createElement('div');
              const meta = document.createElement('div'); meta.style.cssText = 'font-size:12px;color:#94a3b8;margin-top:6px';
              meta.textContent = `Created: ${new Date(n.created).toLocaleString()} • Unlocks: ${new Date(n.unlockAt).toLocaleString()}`;
              if(now < n.unlockAt){
                left.innerHTML = '<strong style="color:#f59e0b">Locked note</strong><div style="margin-top:8px;color:#cbd5e1">Hidden until unlock date.</div>';
                left.appendChild(meta);
              } else {
                const text = document.createElement('div'); text.textContent = n.text; text.style.whiteSpace='pre-wrap'; text.style.color='#e6eef8';
                left.appendChild(text); left.appendChild(meta);
              }
              const actions = document.createElement('div'); actions.style.cssText = 'display:flex;flex-direction:column;gap:6px';
              const rem = document.createElement('div'); rem.style.cssText='font-size:12px;color:#cbd5e1'; rem.textContent = now < n.unlockAt ? `Unlocks in ${formatRemaining(n.unlockAt - now)}` : 'Unlocked';
              actions.appendChild(rem);
              const del = document.createElement('button'); del.textContent = 'Delete'; del.style.cssText='padding:6px;border-radius:6px;background:#334155;color:#e6eef8;border:0;cursor:pointer';
              del.onclick = ()=>{ if(confirm('Delete this note?')){ notes = notes.filter(x=>x.id!==n.id); saveStore(); render(); } };
              actions.appendChild(del);
              wrap.appendChild(left); wrap.appendChild(actions); el.list.appendChild(wrap);
            });
          }

          function addNote(text, days){
            const d = Math.max(1, parseInt(days)||365);
            const unlockAt = Date.now() + d * 24*60*60*1000;
            notes.push({ id: Date.now().toString(36), text: text.trim(), created: Date.now(), unlockAt });
            saveStore(); render(); el.note.value = ''; el.days.value = '365';
          }

          if (el.save.dataset.boundEncNotes === '1') {
            render();
            return;
          }

          el.save.dataset.boundEncNotes = '1';
          el.clear.dataset.boundEncNotes = '1';
          el.save.addEventListener('click', ()=>{ const t = el.note.value.trim(); if(!t) return alert('Enter a note.'); addNote(t, el.days.value); });
          el.clear.addEventListener('click', ()=>{ if(confirm('Clear ALL encapsulated notes?')){ notes=[]; saveStore(); render(); } });
          render();
        } catch (e) { console.error('initEncapsulatedNotes error', e); }
      }
      // Initialize encapsulated notes and tracker when the affirmations view becomes active
      function initTracker() {
        try {
          const KEY = 'vita-tracker-events-v1'
          const titleEl = document.getElementById('tracker-title')
          if (!titleEl) return

          const el = {
            title: titleEl,
            date: document.getElementById('tracker-date'),
            recurrence: document.getElementById('tracker-recurrence'),
            save: document.getElementById('tracker-save'),
            clear: document.getElementById('tracker-clear'),
            list: document.getElementById('tracker-list')
          }

          let events = JSON.parse(localStorage.getItem(KEY) || '[]')
          let editingId = null

          function saveStore(){ localStorage.setItem(KEY, JSON.stringify(events)) }

          function daysUntilDate(dStr, recurrence){
            if(!dStr) return { days: Infinity, nextDate: null }
            const today = new Date(); today.setHours(0,0,0,0)
            const target = new Date(dStr)
            if(recurrence === 'annual'){
              const month = target.getMonth(); const day = target.getDate()
              let next = new Date(today.getFullYear(), month, day)
              if(next < today) next = new Date(today.getFullYear()+1, month, day)
              const diff = Math.ceil((next - today)/(24*60*60*1000))
              return { days: diff, nextDate: next }
            } else {
              const diff = Math.ceil((target - today)/(24*60*60*1000))
              return { days: diff, nextDate: target }
            }
          }

          function render(){
            el.list.innerHTML = ''
            if(!events.length){ el.list.innerHTML = '<p className="text-sm text-slate-400">No events yet.</p>'; return }
            const mapped = events.map(ev => { const info = daysUntilDate(ev.date, ev.recurrence); return { ...ev, days: info.days, next: info.nextDate } }).sort((a,b)=>a.days - b.days)
            mapped.forEach(ev => {
              const wrap = document.createElement('div'); wrap.style.cssText = 'display:flex;justify-content:space-between;gap:12px;padding:10px;border-radius:8px;border:1px solid #122233;background:#06131f;margin-top:8px'
              const left = document.createElement('div')
              const title = document.createElement('div'); title.textContent = ev.title; title.style.fontWeight='600'
              const meta = document.createElement('div'); meta.style.cssText='font-size:13px;color:#94a3b8;margin-top:4px'
              meta.textContent = ev.recurrence === 'annual' ? `Next: ${ev.next.toLocaleDateString()} • Recurs annually` : `Date: ${ev.next.toLocaleDateString()}`
              left.appendChild(title); left.appendChild(meta)

              const right = document.createElement('div'); right.style.textAlign='right'
              const days = document.createElement('div'); days.style.cssText='font-size:20px;font-weight:700'; days.textContent = ev.days >= 0 ? `${ev.days}d` : 'past'
              const actions = document.createElement('div'); actions.style.marginTop='8px'
              const edit = document.createElement('button'); edit.textContent = 'Edit'; edit.style.marginRight='6px'; edit.onclick = ()=> startEdit(ev.id)
              const del = document.createElement('button'); del.textContent = 'Delete'; del.style.cssText='background:#ef4444;color:#fff;padding:6px;border-radius:6px;border:0'; del.onclick = ()=>{ if(confirm('Delete this event?')){ events = events.filter(x=>x.id!==ev.id); saveStore(); render() } }
              actions.appendChild(edit); actions.appendChild(del)
              right.appendChild(days); right.appendChild(actions)
              wrap.appendChild(left); wrap.appendChild(right); el.list.appendChild(wrap)
            })
          }

          function startEdit(id){ const ev = events.find(x=>x.id===id); if(!ev) return; editingId = id; el.title.value = ev.title; el.date.value = ev.date; el.recurrence.value = ev.recurrence || 'none'; el.save.textContent = 'Update Event'; window.scrollTo({ top: 0, behavior: 'smooth' }) }

          function addOrUpdate(){ const title = el.title.value.trim(); const date = el.date.value; const recurrence = el.recurrence.value; if(!title || !date) return alert('Please provide title and date.'); if(editingId){ events = events.map(ev => ev.id===editingId ? {...ev, title, date, recurrence } : ev); editingId = null; el.save.textContent = 'Save Event' } else { events.push({ id: Date.now().toString(36), title, date, recurrence, created: Date.now() }) } el.title.value = ''; el.date.value = ''; el.recurrence.value='none'; saveStore(); render() }

          if (el.save.dataset.boundTracker === '1') {
            render()
            return
          }

          el.save.dataset.boundTracker = '1'
          el.clear.dataset.boundTracker = '1'
          el.save.addEventListener('click', addOrUpdate)
          el.clear.addEventListener('click', ()=>{ if(confirm('Clear ALL events?')){ events=[]; saveStore(); render() } })

          render()
        } catch (e) { console.error('initTracker error', e) }
      }

      function makeStorage() {
        if (window.storage && window.storage.get && window.storage.set && window.storage.list) {
          return window.storage;
        }
        return {
          get: async (key) => {
            const val = localStorage.getItem(key);
            return val ? { value: val } : null;
          },
          set: async (key, value) => {
            localStorage.setItem(key, value);
            return { key, value };
          },
          list: async (prefix) => {
            const keys = Object.keys(localStorage).filter(k => k.startsWith(prefix));
            return { keys };
          }
        };

      function getStreak() {
        if (!history || history.length === 0) return 0;
        let streak = 0;
        const sorted = [...history].sort((a, b) => new Date(b.date) - new Date(a.date));
        const todayStr = getTodayLocal();
        const todayHasData = data && data.done && data.done.length > 0;
        if (todayHasData) streak = 1;
        else if (sorted.length > 0 && sorted[0].date === todayStr) {
          if (sorted[0].done && sorted[0].done.length > 0) streak = 1;
        }
        const startIdx = sorted[0]?.date === todayStr ? 1 : 0;
        let expectedDate = new Date(todayStr);
        expectedDate.setDate(expectedDate.getDate() - (streak > 0 ? 1 : 0));
        for (let i = startIdx; i < sorted.length; i++) {
          const dayDate = new Date(sorted[i].date);
          const diff = Math.round((expectedDate - dayDate) / (1000 * 60 * 60 * 24));
          if (diff === 0 && sorted[i].done && sorted[i].done.length > 0) {
            streak++;
            expectedDate.setDate(expectedDate.getDate() - 1);
          } else if (diff === 0) {
            break;
          } else {
            break;
          }
        }
        return streak;
      }

      function reviewSpacedItem(itemId, quality) {
        // SuperMemo-2 algorithm for spaced repetition
        const item = spacedRepetition.find(i => i.id === itemId);
        if (!item) return;

        let newInterval, newEaseFactor;

        if (quality >= 3) { // Correct response
          if (item.repetitions === 0) {
            newInterval = 1;
          } else if (item.repetitions === 1) {
            newInterval = 6;
          } else {
            newInterval = Math.round(item.interval * item.easeFactor);
          }

          newEaseFactor = item.easeFactor + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
        } else { // Incorrect response
          newInterval = 1;
          newEaseFactor = item.easeFactor;
        }

        newEaseFactor = Math.max(1.3, newEaseFactor);

        const updatedItem = {
          ...item,
          interval: newInterval,
          easeFactor: newEaseFactor,
          repetitions: quality >= 3 ? item.repetitions + 1 : 0,
          nextReview: new Date(Date.now() + newInterval * 24 * 60 * 60 * 1000).toISOString(),
          lastReviewed: new Date().toISOString()
        };

        const updatedRepetition = spacedRepetition.map(i =>
          i.id === itemId ? updatedItem : i
        ).filter(i => new Date(i.nextReview) > new Date()); // Remove completed items

        setSpacedRepetition(updatedRepetition);
        localStorage.setItem('vita-spaced-repetition', JSON.stringify(updatedRepetition));
      }

      function updateChallengeProgress(challengeId, completed) {
        const challenge = challenges.find(c => c.id === challengeId);
        if (!challenge) return;

        const today = new Date().toISOString().split('T')[0];
        const existingProgress = challenge.progress.find(p => p.date === today);

        let newProgress;
        if (existingProgress) {
          newProgress = challenge.progress.map(p =>
            p.date === today ? { ...p, completed } : p
          );
        } else {
          newProgress = [...challenge.progress, { date: today, completed }];
        }

        // Calculate streaks
        const sortedProgress = newProgress.sort((a, b) => new Date(b.date) - new Date(a.date));
        let currentStreak = 0;
        let bestStreak = challenge.bestStreak;

        for (const day of sortedProgress) {
          if (day.completed) {
            currentStreak++;
          } else {
            break;
          }
        }

        bestStreak = Math.max(bestStreak, currentStreak);

        const updatedChallenge = {
          ...challenge,
          progress: newProgress,
          currentStreak,
          bestStreak
        };

        // Check if challenge is completed
        const challengeEndDate = new Date(challenge.startDate);
        challengeEndDate.setDate(challengeEndDate.getDate() + challenge.duration);

        if (new Date() >= challengeEndDate && currentStreak >= Math.ceil(challenge.duration * 0.8)) {
          // Challenge completed successfully
          updatedChallenge.completed = true;
          updatedChallenge.completedAt = new Date().toISOString();

          // Award badge
          awardBadge({
            name: `${challenge.title} Champion`,
            description: `Completed ${challenge.duration}-day ${challenge.category} challenge`,
            icon: getBadgeIcon(challenge.category),
            earnedAt: new Date().toISOString(),
            challengeId: challenge.id
          });

          setCompletedChallenges(prev => [...prev, updatedChallenge]);
          setChallenges(prev => prev.filter(c => c.id !== challengeId));
        } else {
          setChallenges(prev => prev.map(c => c.id === challengeId ? updatedChallenge : c));
        }

        localStorage.setItem('vita-challenges', JSON.stringify([...challenges.filter(c => c.id !== challengeId).map(c => c.id === challengeId ? updatedChallenge : c), ...completedChallenges]));
      }

        const todayKey = getTodayLocal();
        const todaysMeals = (nutritionData && nutritionData[todayKey]) ? nutritionData[todayKey] : {
          breakfast: [], lunch: [], dinner: [], snacks: []
        };

        // Calculate daily totals
        const calculateTotals = () => {
          const allFoods = Object.values(todaysMeals).flat();
          return allFoods.reduce((totals, food) => ({
            calories: totals.calories + (food.calories || 0),
            protein: totals.protein + (food.protein || 0),
            carbs: totals.carbs + (food.carbs || 0),
            fat: totals.fat + (food.fat || 0)
          }), { calories: 0, protein: 0, carbs: 0, fat: 0 });
        };

        const dailyTotals = calculateTotals();

        const addFoodToMeal = (food, mealType = selectedMeal, options = {}) => {
          const updatedMeals = {
            ...todaysMeals,
            [mealType]: [...todaysMeals[mealType], food]
          };
          const updatedNutrition = {
            ...nutritionData,
            [todayKey]: updatedMeals
          };
          setNutritionData(updatedNutrition);
          localStorage.setItem('vita-nutrition', JSON.stringify(updatedNutrition));
          if (options.closeModal !== false) setShowAddFood(false);
        };

        const addFood = (food) => addFoodToMeal(food, selectedMeal);

        const addCustomFood = () => {
          if (!customFood.name.trim()) return;
          addFood({
            name: customFood.name.trim(),
            calories: parseInt(customFood.calories) || 0,
            protein: parseInt(customFood.protein) || 0,
            carbs: parseInt(customFood.carbs) || 0,
            fat: parseInt(customFood.fat) || 0
          });
          setCustomFood({ name: '', calories: '', protein: '', carbs: '', fat: '' });
        };

        const removeFood = (mealType, index) => {
          const updatedMeals = {
            ...todaysMeals,
            [mealType]: todaysMeals[mealType].filter((_, i) => i !== index)
          };
          const updatedNutrition = {
            ...nutritionData,
            [todayKey]: updatedMeals
          };
          setNutritionData(updatedNutrition);
          localStorage.setItem('vita-nutrition', JSON.stringify(updatedNutrition));
        };

        const getYesterdayKey = () => {
          const date = new Date();
          date.setDate(date.getDate() - 1);
          const y = date.getFullYear();
          const m = String(date.getMonth() + 1).padStart(2, '0');
          const day = String(date.getDate()).padStart(2, '0');
          return `${y}-${m}-${day}`;
        };

        const getNutritionHistory = () => {
          return Object.entries(nutritionData || {})
            .filter(([date]) => date !== todayKey)
            .sort(([a], [b]) => new Date(b) - new Date(a));
        };

        const getFrequentFoods = (mealType = null, limit = 6) => {
          const counts = {};
          getNutritionHistory().forEach(([, meals]) => {
            const mealEntries = mealType ? [meals[mealType] || []] : Object.values(meals || {});
            mealEntries.flat().forEach(food => {
              if (!food || !food.name) return;
              if (!counts[food.name]) counts[food.name] = { food, count: 0 };
              counts[food.name].count += 1;
            });
          });
          return Object.values(counts)
            .sort((a, b) => b.count - a.count)
            .slice(0, limit);
        };

        const getRecentFoods = (limit = 6) => {
          const seen = new Set();
          const recent = [];
          getNutritionHistory().forEach(([, meals]) => {
            Object.values(meals || {}).flat().forEach(food => {
              if (!food || !food.name || seen.has(food.name)) return;
              seen.add(food.name);
              recent.push(food);
            });
          });
          return recent.slice(0, limit);

          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `vita-backup-${new Date().toISOString().split('T')[0]}.json`;
          a.click();
          URL.revokeObjectURL(url);

          // Update last backup timestamp
          localStorage.setItem('vita-last-backup', new Date().toISOString());

          alert('✅ Data exported successfully! File downloaded to your device.');
        };

        // Data import functionality
        const importData = (event) => {
          const file = event.target.files[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const importedData = JSON.parse(e.target.result);

              // Validate data structure
              if (!importedData.data || !importedData.app || importedData.app !== 'Vita - Personal Development Tracker') {
                alert('❌ Invalid backup file format. Please select a valid Vita backup file.');
                return;
              }

              if (!confirm('⚠️ This will replace all your current data. Are you sure you want to continue?')) {
                return;
              }

              // Import data
              const data = importedData.data;

              // Save to localStorage
              if (data.history) localStorage.setItem('vita-history', JSON.stringify(data.history));
              if (data.nutritionData) localStorage.setItem('vita-nutrition', JSON.stringify(data.nutritionData));
              if (data.knowledgeBase) localStorage.setItem('vita-knowledge-base', JSON.stringify(data.knowledgeBase));

              if (data.badges) localStorage.setItem('vita-badges', JSON.stringify(data.badges));
              if (data.aiCoachInsights) localStorage.setItem('vita-ai-insights', JSON.stringify(data.aiCoachInsights));
              if (data.readingProgress) localStorage.setItem('vita-reading-progress', JSON.stringify(data.readingProgress));
              if (data.readingHistory) localStorage.setItem('vita-reading-history', JSON.stringify(data.readingHistory));
              if (data.customTasks) localStorage.setItem('vita-custom-tasks', JSON.stringify(data.customTasks));
              if (data.hiddenTasks) localStorage.setItem('vita-hidden-tasks', JSON.stringify(data.hiddenTasks));
              if (data.weightHistory) localStorage.setItem('vita-weight-history', JSON.stringify(data.weightHistory));
              if (data.sleepData) localStorage.setItem('vita-sleep-data', JSON.stringify(data.sleepData));
              if (data.weeklyReviews) localStorage.setItem('vita-weekly-reviews', JSON.stringify(data.weeklyReviews));
              if (data.trackedHabits) localStorage.setItem('vita-tracked-habits', JSON.stringify(data.trackedHabits));

              alert('✅ Data imported successfully! Refreshing the app...');
              window.location.reload();

            } catch (error) {
              alert('❌ Error importing data. Please check the file format and try again.');
              console.error('Import error:', error);

          reader.readAsText(file);

        // Data integrity check

          }

          if (history.length < 7) {
            return {
              insights: [],
              message: "Need at least 7 days of data to generate insights. Keep tracking!"
            };
          }

          const insights = [];
          const daysOfWeek = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];

          // Analyze workout patterns
          const workoutDays = history.filter(d => d.workoutDone);
          if (workoutDays.length > 0) {
            const workoutDayCounts = {};
            workoutDays.forEach(day => {
              const dayName = new Date(day.date).toLocaleDateString('en-US', { weekday: 'long' });
              workoutDayCounts[dayName] = (workoutDayCounts[dayName] || 0) + 1;
            });

            const bestWorkoutDay = Object.entries(workoutDayCounts)
              .sort(([,a], [,b]) => b - a)[0]?.[0];

            if (bestWorkoutDay) {
              insights.push({
                type: 'workout',
                icon: '💪',
                title: 'Workout Patterns',
                insight: `You workout most consistently on ${bestWorkoutDay}s. Consider scheduling important workouts on this day.`,
                impact: 'High'
              });
            }
          }

          // Analyze task completion vs mood
          const moodData = history.filter(d => d.mood);
          if (moodData.length > 3) {
            const moodTaskCorrelation = {};
            moodData.forEach(day => {
              const mood = day.mood;
              const taskRate = day.done ? (day.done.length / 18) * 100 : 0;
              if (!moodTaskCorrelation[mood]) moodTaskCorrelation[mood] = [];
              moodTaskCorrelation[mood].push(taskRate);
            });

            const bestMood = Object.entries(moodTaskCorrelation)
              .map(([mood, rates]) => ({
                mood,
                avgTasks: rates.reduce((a, b) => a + b, 0) / rates.length
              }))
              .sort((a, b) => b.avgTasks - a.avgTasks)[0];

            if (bestMood && bestMood.avgTasks > 50) {
              insights.push({
                type: 'mood',
                icon: '😊',
                title: 'Mood & Productivity',
                insight: `You're most productive when feeling ${bestMood.mood} (${Math.round(bestMood.avgTasks)}% task completion). Try to cultivate this emotional state.`,
                impact: 'High'
              });
            }
          }

          // Analyze reading patterns
          const readingDays = history.filter(d => d.done && d.done.some(task => task.includes('read')));
          if (readingDays.length > 0) {
            const avgTasksOnReadingDays = readingDays.reduce((sum, day) => sum + (day.done ? day.done.length : 0), 0) / readingDays.length;
            const avgTasksOverall = history.reduce((sum, day) => sum + (day.done ? day.done.length : 0), 0) / history.length;

            if (avgTasksOnReadingDays > avgTasksOverall + 2) {
              insights.push({
                type: 'reading',
                icon: '📚',
                title: 'Reading Impact',
                insight: `You complete ${Math.round(avgTasksOnReadingDays - avgTasksOverall)} more tasks on days you read. Reading boosts your productivity!`,
                impact: 'Medium'
              });
            }
          }

          // Analyze water intake patterns
          const waterData = history.filter(d => d.water && d.water > 0);
          if (waterData.length > 3) {
            const avgTasksWithWater = waterData.reduce((sum, day) => sum + (day.done ? day.done.length : 0), 0) / waterData.length;
            const avgTasksOverall = history.reduce((sum, day) => sum + (day.done ? day.done.length : 0), 0) / history.length;

            if (avgTasksWithWater > avgTasksOverall + 1) {
              insights.push({
                type: 'hydration',
                icon: '💧',
                title: 'Hydration Habits',
                insight: `You perform better when staying hydrated. Consider increasing water intake for optimal productivity.`,
                impact: 'Medium'
              });
            }
          }

          // Analyze sleep patterns (using morning routine as proxy)
          const morningRoutineDays = history.filter(d => d.done && d.done.some(task => task.includes('cold') || task.includes('sun')));
          if (morningRoutineDays.length > 0) {
            const avgTasksMorningDays = morningRoutineDays.reduce((sum, day) => sum + (day.done ? day.done.length : 0), 0) / morningRoutineDays.length;
            const avgTasksOverall = history.reduce((sum, day) => sum + (day.done ? day.done.length : 0), 0) / history.length;

            if (avgTasksMorningDays > avgTasksOverall + 1) {
              insights.push({
                type: 'routine',
                icon: '🌅',
                title: 'Morning Routine',
                insight: `Your morning routine (cold exposure/sunlight) boosts productivity by ${Math.round(avgTasksMorningDays - avgTasksOverall)} tasks per day.`,
                impact: 'High'
              });
            }
          }

          // Analyze deep work patterns
          const deepWorkDays = history.filter(d => d.deepWork && parseFloat(d.deepWork) > 0);
          if (deepWorkDays.length > 3) {
            const deepWorkTaskCorr = deepWorkDays.map(day => ({
              deepWork: parseFloat(day.deepWork) || 0,
              tasks: day.done ? day.done.length : 0
            }));

            const correlation = deepWorkTaskCorr.reduce((sum, data) => sum + (data.deepWork * data.tasks), 0) /

            if (correlation > 5) {
              insights.push({
                type: 'focus',
                icon: '🎯',
                title: 'Deep Work Benefits',
                insight: `Your deep work sessions strongly correlate with task completion. More focused time = better results.`,
                impact: 'High'
              });
            }
          }

          return {
            insights,
            message: insights.length === 0 ? "Keep tracking for more personalized insights!" : `Found ${insights.length} patterns in your data!`
          };
        };

        const { insights, message } = analyzePatterns();

        return (

                        <div className="flex items-center justify-between">
                          <span className="text-sm">{t.t}</span>
                          {data.done.includes(t.id) && <span>✅</span>}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
                {visibleCommTasks.length > 0 && (
                  <div className="bg-slate-800 rounded-xl p-5 border border-slate-700">
                    <h3 className="mb-3 text-sm font-medium text-gray-400">Communication</h3>
                    {visibleCommTasks.map(t => (
                      <div key={t.id} onClick={() => toggle(t.id)} className={`p-3 rounded-lg mb-2 cursor-pointer ${data.done.includes(t.id) ? 'bg-purple-900 border-2 border-purple-500' : 'bg-slate-700'}`}>
                        <div className="flex items-center justify-between">
                          <span className="text-sm">{t.t}</span>
                          {data.done.includes(t.id) && <span>✅</span>}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
                {customTasks.filter(t => !hiddenTasks.includes(t.id)).length > 0 && (
                  <div className="bg-slate-800 rounded-xl p-5 border border-slate-700">
                    <h3 className="mb-3 text-sm font-medium text-gray-400">My Tasks</h3>
                    {customTasks.filter(t => !hiddenTasks.includes(t.id)).map(t => (
                      <div key={t.id} onClick={() => toggle(t.id)} className={`p-3 rounded-lg mb-2 cursor-pointer ${data.done.includes(t.id) ? 'bg-cyan-900 border-2 border-cyan-500' : 'bg-slate-700'}`}>
                        <div className="flex items-center justify-between">
                          <span className="text-sm">{t.t}</span>
                          {data.done.includes(t.id) && <span>✅</span>}
                        </div>
                      </div>
                    ))}
                  </div>
                )}
            </div>

            {/* Body Weight Tracking */}
            <div className="bg-slate-800 rounded-xl p-5 mb-6 border border-slate-700">
              <div className="flex justify-between items-center mb-3">
                <h3 className="text-sm font-medium text-gray-400">⚖️ Body Weight</h3>
                {weightHistory.length > 0 && (
                  <button onClick={() => setShowWeightLog(!showWeightLog)} className="text-xs text-gray-500 hover:text-gray-300">{showWeightLog ? 'Hide' : 'History'}</button>
                )}
              </div>
              {weightHistory.length > 0 && weightHistory[0].date === getTodayLocal() ? (
                <div className="flex items-center justify-between">
                  <span className="text-lg font-bold text-cyan-400">{weightHistory[0].weight} lbs</span>
                  {weightHistory.length >= 2 && (() => {
                    const diff = (weightHistory[0].weight - weightHistory[1].weight).toFixed(1);
                    return <span className={`text-sm ${diff > 0 ? 'text-red-400' : diff < 0 ? 'text-green-400' : 'text-gray-400'}`}>{diff > 0 ? '+' : ''}{diff} lbs</span>;
                  })()}
                </div>
              ) : (
                <div className="flex gap-2">
                  <input type="number" step="0.1" value={bodyWeight} onChange={e => setBodyWeight(e.target.value)} placeholder="Weight (lbs)" className="flex-1 p-2 bg-slate-700 rounded text-white text-sm" />
                  <button onClick={() => logBodyWeight(bodyWeight)} className="px-4 py-2 bg-cyan-600 text-white rounded text-sm hover:bg-cyan-700">Log</button>
                </div>
              )}
              {showWeightLog && weightHistory.length > 0 && (
                <div className="mt-3 space-y-1 max-h-40 overflow-y-auto">
                  {weightHistory.slice(0, 14).map((w, i) => (
                    <div key={i} className="flex justify-between text-xs text-gray-400 py-1 border-b border-slate-700">
                      <span>{new Date(w.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</span>
                      <span className="text-white">{w.weight} lbs</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Custom Task Management */}
            <div className="bg-slate-800 rounded-xl p-5 mb-6 border border-slate-700">
              <div className="flex justify-between items-center mb-3">
                <h3 className="text-sm font-medium text-gray-400">✏️ Manage Tasks</h3>
                <button onClick={() => setShowManageTasks(!showManageTasks)} className="text-xs text-gray-500 hover:text-gray-300">{showManageTasks ? 'Close' : 'Open'}</button>
              </div>
              {showManageTasks && (
                <div>
                  <div className="flex gap-2 mb-4">
                    <input type="text" value={newCustomTask} onChange={e => setNewCustomTask(e.target.value)} onKeyDown={e => { if (e.key === 'Enter') addCustomTask(newCustomTask); }} placeholder="Add a custom task..." className="flex-1 p-2 bg-slate-700 rounded text-white text-sm" />
                    <button onClick={() => addCustomTask(newCustomTask)} className="px-4 py-2 bg-emerald-600 text-white rounded text-sm hover:bg-emerald-700">Add</button>
                  </div>
                  <p className="text-xs text-gray-500 mb-2">Tap to hide/show. Red = hidden.</p>
                  <div className="space-y-1 max-h-60 overflow-y-auto">
                    {[...tasks.core, ...tasks.lead, ...tasks.comm].map(t => (
                      <div key={t.id} onClick={() => toggleHideTask(t.id)} className={`p-2 rounded text-sm cursor-pointer flex items-center justify-between ${hiddenTasks.includes(t.id) ? 'bg-red-900/30 text-red-300 line-through' : 'bg-slate-700 text-gray-300'}`}>
                        <span>{t.t}</span>
                        <span className="text-xs">{hiddenTasks.includes(t.id) ? 'Hidden' : '✓'}</span>
                      </div>
                    ))}
                    {customTasks.map(t => (
                      <div key={t.id} className="p-2 rounded text-sm bg-slate-700 text-gray-300 flex items-center justify-between">
                        <span className={hiddenTasks.includes(t.id) ? 'line-through text-red-300' : ''}>{t.t}</span>
                        <div className="flex gap-2">
                          <button onClick={() => toggleHideTask(t.id)} className="text-xs text-gray-500 hover:text-gray-300">{hiddenTasks.includes(t.id) ? 'Show' : 'Hide'}</button>
                          <button onClick={() => removeCustomTask(t.id)} className="text-xs text-red-400 hover:text-red-300">Delete</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>

            {/* Mood-to-Action Correlations quick insight */}
            {history.length >= 7 && (() => {
              const moodScores = { '😊 Sharp': 5, '🙂 Good': 4, '😐 Okay': 3, '😔 Off': 2, '😰 Hard': 1 };
              const recent = history.slice(0, 14).filter(d => d.mood);
              if (recent.length < 3) return null;
              const workoutDays = recent.filter(d => d.workoutDone);
              const noWorkoutDays = recent.filter(d => !d.workoutDone);
              const avgMoodWorkout = workoutDays.length > 0 ? (workoutDays.reduce((s, d) => s + (moodScores[d.mood] || 3), 0) / workoutDays.length).toFixed(1) : null;
              const avgMoodNoWorkout = noWorkoutDays.length > 0 ? (noWorkoutDays.reduce((s, d) => s + (moodScores[d.mood] || 3), 0) / noWorkoutDays.length).toFixed(1) : null;
              const avgWaterGood = recent.filter(d => (d.water || 0) >= 6);
              const avgWaterLow = recent.filter(d => (d.water || 0) < 6);
              const moodHighWater = avgWaterGood.length > 0 ? (avgWaterGood.reduce((s, d) => s + (moodScores[d.mood] || 3), 0) / avgWaterGood.length).toFixed(1) : null;
              const moodLowWater = avgWaterLow.length > 0 ? (avgWaterLow.reduce((s, d) => s + (moodScores[d.mood] || 3), 0) / avgWaterLow.length).toFixed(1) : null;

              return (
                <div className="bg-slate-800 rounded-xl p-5 mb-6 border border-slate-700">
                  <h3 className="text-sm font-medium text-gray-400 mb-3">🔗 Mood-Action Correlations</h3>
                  <div className="space-y-2 text-sm">
                    {avgMoodWorkout && avgMoodNoWorkout && (
                      <div className="flex items-center justify-between p-2 bg-slate-700 rounded">
                        <span className="text-gray-300">Workout days vs rest days</span>
                        <span className={`font-bold ${parseFloat(avgMoodWorkout) > parseFloat(avgMoodNoWorkout) ? 'text-green-400' : 'text-gray-400'}`}>
                          {avgMoodWorkout} vs {avgMoodNoWorkout}
                        </span>
                      </div>
                    )}
                    {moodHighWater && moodLowWater && (
                      <div className="flex items-center justify-between p-2 bg-slate-700 rounded">
                        <span className="text-gray-300">Good hydration vs low</span>
                        <span className={`font-bold ${parseFloat(moodHighWater) > parseFloat(moodLowWater) ? 'text-blue-400' : 'text-gray-400'}`}>
                          {moodHighWater} vs {moodLowWater}
                        </span>
                      </div>
                    )}
                    <p className="text-xs text-gray-500 mt-1">Based on your last 14 days. Higher = better mood (1-5 scale).</p>
                  </div>
                </div>
              );
            })()}

            {/* Reflection with rotating journal prompt — auto-saves on blur */}
            <div className="bg-slate-800 rounded-xl p-5 mb-6 border border-slate-700">
              <h3 className="text-sm font-medium text-gray-400 mb-2">📚 Reflection</h3>
              <p className="text-xs text-amber-400/80 mb-3 italic">Prompt: {todayPrompt}</p>
              <textarea value={journal} onChange={e => setJournal(e.target.value)} onBlur={async () => { const nd = { ...data, journal }; const cleanData = JSON.parse(JSON.stringify(nd)); setData(cleanData); await save(cleanData); }} placeholder="What did I lead? What did I ship? How did I grow?" className="w-full p-3 bg-slate-700 rounded text-white text-sm" rows="3" />
            </div>

            {/* Today Summary Card */}
            <div className="bg-gradient-to-br from-slate-800 to-slate-900 rounded-xl p-5 border border-slate-700">
              <h3 className="text-sm font-medium text-gray-400 mb-3">📊 Today's Summary</h3>
              <div className="grid grid-cols-4 gap-3 text-center">
                <div>
                  <p className="text-xl font-bold text-amber-400">{done}/{total}</p>
                  <p className="text-xs text-gray-500">Tasks</p>
                </div>
                <div>
                  <p className="text-xl font-bold text-blue-400">{water}/8</p>
                  <p className="text-xs text-gray-500">Water</p>
                </div>
                <div>
                  <p className="text-xl font-bold text-purple-400">{data.mood ? data.mood.split(' ')[0] : '—'}</p>
                  <p className="text-xs text-gray-500">Mood</p>
                </div>
                <div>
                  <p className="text-xl font-bold text-green-400">{data.workoutDone ? '✅' : '—'}</p>
                  <p className="text-xs text-gray-500">Workout</p>
                </div>
              </div>
              <div className="mt-3 w-full bg-slate-700 rounded-full h-2">
                <div className="h-2 rounded-full bg-amber-500 transition-all duration-500" style={{ width: `${total > 0 ? (done/total)*100 : 0}%` }} />
              </div>
              <p className="text-xs text-gray-500 text-center mt-2">
                {done === 0 ? "Let's get started" : done < total / 2 ? 'Making progress' : done < total ? 'Almost there' : 'Perfect day'}
                {deepWork ? ` • ${deepWork}h deep work` : ''}
                {todaySleepData ? ` • Sleep logged` : ''}
              </p>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.render(<VitaApp />, document.getElementById('root'));

    // Register Service Worker for PWA functionality
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then((registration) => {
            console.log('Service Worker registered successfully:', registration.scope);
          })
          .catch((error) => {
            console.log('Service Worker registration failed:', error);
          });
      });
    }
  </script>

<!-- Standalone initializers: ensure tracker and encapsulated notes render on page load -->
<script>
  (function(){
    function initTrackerStandalone(){
      try{
        const KEY = 'vita-tracker-events-v1'
        const title = document.getElementById('tracker-title')
        if(!title) return
        const el = {
          title,
          date: document.getElementById('tracker-date'),
          recurrence: document.getElementById('tracker-recurrence'),
          save: document.getElementById('tracker-save'),
          clear: document.getElementById('tracker-clear'),
          list: document.getElementById('tracker-list')
        }
        let events = JSON.parse(localStorage.getItem(KEY) || '[]')
        let editingId = null
        function saveStore(){ localStorage.setItem(KEY, JSON.stringify(events)) }
        function daysUntilDate(dStr, recurrence){ if(!dStr) return { days: Infinity, nextDate: null }; const today=new Date(); today.setHours(0,0,0,0); const target=new Date(dStr); if(recurrence==='annual'){ const month=target.getMonth(); const day=target.getDate(); let next=new Date(today.getFullYear(), month, day); if(next < today) next = new Date(today.getFullYear()+1, month, day); const diff=Math.ceil((next-today)/(24*60*60*1000)); return { days: diff, nextDate: next }; } else { const diff=Math.ceil((target-today)/(24*60*60*1000)); return { days: diff, nextDate: target }; } }
        function render(){ el.list.innerHTML=''; if(!events.length){ el.list.innerHTML = '<p style="color:#94a3b8">No events yet.</p>'; return } const mapped = events.map(ev => { const info = daysUntilDate(ev.date, ev.recurrence); return {...ev, days: info.days, next: info.nextDate} }).sort((a,b)=>a.days-b.days); mapped.forEach(ev=>{ const wrap=document.createElement('div'); wrap.style.cssText='display:flex;justify-content:space-between;gap:12px;padding:10px;border-radius:8px;border:1px solid #122233;background:#06131f;margin-top:8px'; const left=document.createElement('div'); const titleEl=document.createElement('div'); titleEl.textContent=ev.title; titleEl.style.fontWeight='600'; const meta=document.createElement('div'); meta.style.cssText='font-size:13px;color:#94a3b8;margin-top:4px'; meta.textContent = ev.recurrence==='annual' ? `Next: ${ev.next.toLocaleDateString()} • Recurs annually` : `Date: ${ev.next.toLocaleDateString()}`; left.appendChild(titleEl); left.appendChild(meta); const right=document.createElement('div'); right.style.textAlign='right'; const days=document.createElement('div'); days.style.cssText='font-size:20px;font-weight:700;color:#f59e0b'; days.textContent = ev.days>=0? `${ev.days}d` : 'past'; const actions=document.createElement('div'); actions.style.marginTop='8px'; const edit=document.createElement('button'); edit.textContent='Edit'; edit.style.marginRight='6px'; edit.onclick=()=>startEdit(ev.id); const del=document.createElement('button'); del.textContent='Delete'; del.style.cssText='background:#ef4444;color:#fff;padding:6px;border-radius:6px;border:0'; del.onclick=()=>{ if(confirm('Delete this event?')){ events = events.filter(x=>x.id!==ev.id); saveStore(); render(); } }; actions.appendChild(edit); actions.appendChild(del); right.appendChild(days); right.appendChild(actions); wrap.appendChild(left); wrap.appendChild(right); el.list.appendChild(wrap); }); }
        function startEdit(id){ const ev = events.find(x=>x.id===id); if(!ev) return; editingId = id; el.title.value = ev.title; el.date.value = ev.date; el.recurrence.value = ev.recurrence || 'none'; el.save.textContent = 'Update Event'; window.scrollTo({ top: 0, behavior: 'smooth' }); }
        function addOrUpdate(){ const titleVal = el.title.value.trim(); const dateVal = el.date.value; const recurrence = el.recurrence.value; if(!titleVal || !dateVal) return alert('Please provide title and date.'); if(editingId){ events = events.map(ev => ev.id===editingId ? {...ev, title: titleVal, date: dateVal, recurrence } : ev); editingId = null; el.save.textContent = 'Save Event' } else { events.push({ id: Date.now().toString(36), title: titleVal, date: dateVal, recurrence, created: Date.now() }) } el.title.value=''; el.date.value=''; el.recurrence.value='none'; saveStore(); render(); }
        el.save.addEventListener('click', addOrUpdate); el.clear.addEventListener('click', ()=>{ if(confirm('Clear ALL events?')){ events = []; saveStore(); render(); } }); render();
      }catch(e){ console.error('initTrackerStandalone', e) }
    }

    function initEncapsulatedNotesStandalone(){
      try{
        const KEY = 'encapsulated-notes-v1'
        const note = document.getElementById('enc-note-ai'); if(!note) return
        const el = { note, days: document.getElementById('enc-days-ai'), save: document.getElementById('enc-save-ai'), clear: document.getElementById('enc-clear-ai'), list: document.getElementById('enc-list-ai') }
        let notes = JSON.parse(localStorage.getItem(KEY) || '[]')
        function saveStore(){ localStorage.setItem(KEY, JSON.stringify(notes)) }
        function formatRemaining(ms){ if(ms<=0) return 'unlocked'; const d=Math.ceil(ms/(24*60*60*1000)); return d+' day'+(d===1?'':'s') }
        function render(){ el.list.innerHTML=''; if(!notes.length){ el.list.innerHTML = '<div style="color:#94a3b8">No locked notes.</div>'; return } const now = Date.now(); notes.slice().reverse().forEach(n=>{ const wrap=document.createElement('div'); wrap.style.cssText='background:#06131f;border:1px solid #122233;padding:10px;border-radius:6px;margin-bottom:8px;display:flex;justify-content:space-between;gap:12px;align-items:flex-start'; const left=document.createElement('div'); const meta=document.createElement('div'); meta.style.cssText='font-size:12px;color:#94a3b8;margin-top:6px'; meta.textContent = `Created: ${new Date(n.created).toLocaleString()} • Unlocks: ${new Date(n.unlockAt).toLocaleString()}`; if(now < n.unlockAt){ left.innerHTML = '<strong style="color:#f59e0b">Locked note</strong><div style="margin-top:8px;color:#cbd5e1">Hidden until unlock date.</div>'; left.appendChild(meta); } else { const text = document.createElement('div'); text.textContent = n.text; text.style.whiteSpace='pre-wrap'; text.style.color='#e6eef8'; left.appendChild(text); left.appendChild(meta); } const actions=document.createElement('div'); actions.style.cssText='display:flex;flex-direction:column;gap:6px;align-items:flex-end'; const rem=document.createElement('div'); rem.className='small'; rem.textContent = now < n.unlockAt ? `Unlocks in ${formatRemaining(n.unlockAt - now)}` : 'Unlocked'; const del=document.createElement('button'); del.textContent='Delete'; del.style.cssText='padding:6px;background:#ef4444;color:#fff;border-radius:6px;border:0'; del.onclick = ()=>{ if(confirm('Delete this note?')){ notes = notes.filter(x=>x.id!==n.id); saveStore(); render(); } }; actions.appendChild(rem); actions.appendChild(del); wrap.appendChild(left); wrap.appendChild(actions); el.list.appendChild(wrap); }); }
        function addNote(text, days){ const d = Math.max(1, parseInt(days)||365); const unlockAt = Date.now() + d * 24*60*60*1000; notes.push({ id: Date.now().toString(36), text: text.trim(), created: Date.now(), unlockAt }); saveStore(); render(); el.note.value=''; el.days.value='365' }
        el.save.addEventListener('click', ()=>{ const t = el.note.value.trim(); if(!t) return alert('Enter a note.'); addNote(t, el.days.value) })
        el.clear.addEventListener('click', ()=>{ if(confirm('Clear ALL encapsulated notes?')){ notes=[]; saveStore(); render() } })
        render()
      }catch(e){ console.error('initEncapsulatedNotesStandalone', e) }
    }

    if (document.readyState === 'loading'){
      document.addEventListener('DOMContentLoaded', ()=>{ initTrackerStandalone(); initEncapsulatedNotesStandalone(); })
    } else {
      initTrackerStandalone(); initEncapsulatedNotesStandalone();
    }
  })()
</script>
</body>
</html>
